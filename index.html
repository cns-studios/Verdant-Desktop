<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdant Mail</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #f5f3ef;
    --surface:     #eeece7;
    --surface2:    #e7e4dd;
    --border:      #d8d4cb;
    --green:       #4a5e45;
    --green-mid:   #5c7356;
    --green-light: #7a9470;
    --green-muted: #c8d5c4;
    --green-pale:  #e8efe6;
    --text:        #1e2119;
    --text-mid:    #4a4d45;
    --text-muted:  #8a8d84;
    --white:       #fafaf8;
    --accent:      #3d5239;
    --shadow-lg:   0 8px 32px rgba(30,33,25,0.14), 0 2px 8px rgba(30,33,25,0.06);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  #root {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
